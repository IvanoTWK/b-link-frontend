services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL del backend raggiungibile dal browser — di default il backend gira su localhost:3000
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3000"
    restart: unless-stopped
